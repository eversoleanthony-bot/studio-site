<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthony Eversole — Voice and Stage</title>
  <meta name="description" content="Voice lessons, acting coaching, and stage direction in Salt Lake City. New site coming soon." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%237E3B2C'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='34' fill='%23F6F1E7' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    a { color: inherit; text-decoration: none; }

    :root {
      --bg:     #F6F1E7;
      --ink:    #221E19;
      --body:   #33302A;
      --faint:  #8B8378;
      --meta:   #A89C88;
      --accent: #7E3B2C;
      --border: #E2DACB;
      --serif:  'Newsreader', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 48px 32px;
      text-align: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(126,59,44,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
    }

    .rule {
      width: 28px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 2.2em;
    }

    .name {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 0.01em;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 0.4em;
    }

    .tagline {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 3em;
    }

    .message {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.15rem);
      line-height: 1.85;
      color: var(--body);
      margin-bottom: 2.5em;
    }

    .cta {
      display: inline-block;
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: var(--accent);
      color: var(--bg);
      padding: 14px 30px;
    }

    .cta:hover { opacity: .85; }

    .footer-note {
      position: absolute;
      bottom: 32px;
      left: 0; right: 0;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--meta);
    }

    @media (max-width: 480px) {
      body { padding: 40px 24px 80px; }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="rule"></div>
    <h1 class="name">Anthony Eversole</h1>
    <p class="tagline">Voice &amp; Stage</p>
    <p class="message">
      A new site is on its way. In the meantime, Anthony is accepting new voice and acting students online and in Salt Lake City.
    </p>
    <a class="cta" href="mailto:eversole.anthony@gmail.com">Get in Touch</a>
  </div>

  <p class="footer-note">Salt Lake City &middot; Available via Zoom</p>

</body>
</html>
